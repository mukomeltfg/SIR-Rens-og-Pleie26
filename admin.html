<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>SIR Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="admin.css"></head><body class="admin-page">
<main class="admin-shell"><header class="admin-header"><div><a href="index.html" class="logo"><span>SIR</span> Rens & Pleie</a><h1>Administrasjon</h1><p>Bestillinger, statuser og utseende på nettstedet.</p></div><button id="logoutBtn" class="btn ghost" hidden>Выйти</button></header>
<section id="setupWarning" class="admin-warning" hidden></section>
<section id="loginPanel" class="admin-card"><h2>Вход владельца</h2><p>Введите вашу почту и пароль. Google-настройка не требуется.</p><form id="loginForm"><label>Электронная почта<input id="adminEmail" type="email" autocomplete="username" required value="Sirrenspleie@gmail.com"></label><label>Пароль<input id="adminPassword" type="password" autocomplete="current-password" required minlength="6"></label><button class="btn primary wide">Войти</button><button id="resetPasswordBtn" class="btn ghost wide" type="button">Забыли пароль</button><p id="loginStatus" class="form-status"></p></form></section>

<section id="newPasswordPanel" class="admin-card" hidden>
  <h2>Новый пароль</h2>
  <p>Введите новый пароль не короче 8 символов.</p>
  <form id="newPasswordForm">
    <label>Новый пароль<input id="newPassword" type="password" minlength="8" required></label>
    <label>Повторите пароль<input id="newPassword2" type="password" minlength="8" required></label>
    <button class="btn primary wide" type="submit">Сохранить новый пароль</button>
    <p id="newPasswordStatus" class="form-status"></p>
  </form>
</section>
<section id="adminPanel" hidden><nav class="admin-tabs"><button class="admin-tab active" data-tab="orders">Bestillinger</button><button class="admin-tab" data-tab="settings">Design og tekst</button></nav>
<div id="tab-orders" class="admin-tab-panel"><div class="admin-toolbar"><div><h2>Bestillinger</h2><p id="orderCount"></p></div><button id="refreshBtn" class="btn ghost">Oppdater</button></div><div id="adminOrders" class="admin-orders"></div></div>
<div id="tab-settings" class="admin-tab-panel" hidden><section class="admin-card"><h2>Design og hovedtekst</h2><form id="settingsForm" class="settings-form"><div class="settings-grid"><label>Hovedfarge<input id="primaryColor" type="color" value="#c99a4b"></label><label>Bakgrunn<input id="backgroundColor" type="color" value="#07111f"></label><label>Kortfarge<input id="cardColor" type="color" value="#101d2d"></label><label>Hovedtittel<input id="heroTitleSetting" maxlength="140"></label><label class="full">Undertekst<textarea id="heroTextSetting" rows="3" maxlength="350"></textarea></label><label class="full">Kampanjetekst<input id="promoTextSetting" maxlength="180" placeholder="Eksempel: 10 % rabatt denne uken"></label><label>Vis kampanje<select id="promoEnabled"><option value="false">Nei</option><option value="true">Ja</option></select></label><label>Promokode<input id="promoCodeSetting" maxlength="30" value="SIR10"></label></div><button class="btn primary" type="submit">Lagre endringer</button><p id="settingsStatus" class="form-status"></p></form></section></div>
</section></main><div id="toast" class="toast" role="status"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script><script src="config.js?v=20260717-final2"></script><script src="admin.js?v=20260717-final2"></script></body></html>
